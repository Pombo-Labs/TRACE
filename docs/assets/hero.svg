<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" width="1200" height="320" role="img" aria-label="TRACE — Taxonomy-Referenced ABA Clinical Examples">
  <defs>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2ee6c8"/>
      <stop offset="50%" stop-color="#6c7bff"/>
      <stop offset="100%" stop-color="#ff5ea0"/>
    </linearGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="320" fill="#0a0e1a"/>

  <text x="600" y="170" text-anchor="middle" filter="url(#soft)"
        font-family="'Space Grotesk','Segoe UI',system-ui,-apple-system,Helvetica,Arial,sans-serif"
        font-weight="800" font-size="108" letter-spacing="10" fill="url(#brand)">TRACE</text>

  <text x="600" y="220" text-anchor="middle"
        font-family="'Space Grotesk','Segoe UI',system-ui,-apple-system,Helvetica,Arial,sans-serif"
        font-weight="500" font-size="23" letter-spacing="0.4" fill="#aab4d6">Taxonomy-Referenced ABA Clinical Examples</text>
</svg>
